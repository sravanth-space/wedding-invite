name: Build and Deploy

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  persist-credentials: false

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: yarn

            - name: Install and Build
              run: |
                  yarn install --frozen-lockfile
                  yarn build

            - name: Deploy
              uses: JamesIves/github-pages-deploy-action@v4
              with:
                  token: ${{ github.token }}
                  branch: gh-pages
                  folder: dist
                  clean: true
